services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hem}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-hem}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hem} -d ${POSTGRES_DB:-hem}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    # Build locally, or replace with a prebuilt image once published.
    build: .
    image: home-expense-manager:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hem}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-hem}
      JWT_SECRET: ${JWT_SECRET:-please-change-this-secret}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      DEFAULT_CURRENCY: ${DEFAULT_CURRENCY:-USD}
      NODE_ENV: production
      PORT: 8080
    ports:
      - "${APP_PORT:-8095}:8080"
    volumes:
      - attachments:/data/attachments

volumes:
  db_data:
  attachments:
